services:
  - type: web
    name: trainee-tracker
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # The ONLY variables you must set. Both come from Supabase.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
